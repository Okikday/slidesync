name: Flutter Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > $HOME/upload-keystore.jks

      - name: Create Configuration Files
        shell: bash
        run: |
          mkdir -p lib android/app
          
          # 1. Create key.properties for Gradle signing
          echo "${{ secrets.KEY_PROPERTIES }}" > android/key.properties
          
          # 2. Create .env for API keys (using quoted 'EOF' for safety)
          cat <<'EOF' > .env
          ${{ secrets.ENV_FILE_CONTENT }}
          EOF
          
          # 3. Create google-services.json for Android
          cat <<'EOF' > android/app/google-services.json
          ${{ secrets.GOOGLE_SERVICES_JSON }}
          EOF
          
          # 4. Create firebase_options.dart for Flutter
          cat <<'EOF' > lib/firebase_options.dart
          ${{ secrets.FIREBASE_OPTIONS_DART }}
          EOF
        
      - name: Get dependencies
        run: flutter pub get

      - name: Build APK (Split per ABI)
        run: flutter build apk --release --split-per-abi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-*-release.apk
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
